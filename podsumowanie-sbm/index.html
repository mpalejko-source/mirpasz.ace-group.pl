<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Podsumowania SBM</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --panel-2:#16223d;
      --line:#263556;
      --text:#eaf0ff;
      --muted:#9eb0d3;
      --accent:#7dd3fc;
      --accent2:#a78bfa;
      --gold:#f1c40f;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --radius:22px;
      --max:1400px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Inter, Arial, Helvetica, sans-serif;
      line-height:1.45;
    }

    a{color:inherit;text-decoration:none}
    button{font:inherit}

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 20px 36px;
    }

    .hero{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      margin-bottom:26px;
      padding:26px 28px;
      background:linear-gradient(135deg, rgba(125,211,252,.10), rgba(167,139,250,.08));
      border:1px solid rgba(125,211,252,.18);
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .hero-left{
      max-width:820px;
    }

    .eyebrow{
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:8px;
      font-weight:700;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px, 4vw, 42px);
      line-height:1.08;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .hero-stats{
      min-width:220px;
      padding:18px 18px 16px;
      background:rgba(11,18,32,.45);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
    }

    .hero-stats .kpi-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--muted);
      margin-bottom:8px;
    }

    .hero-stats .kpi-value{
      font-size:34px;
      font-weight:800;
      line-height:1;
      margin-bottom:6px;
    }

    .hero-stats .kpi-note{
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12, 1fr);
      gap:18px;
      margin-bottom:24px;
    }

    .card{
      grid-column:span 4;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
      transition:.18s ease;
      position:relative;
      overflow:hidden;
      cursor:pointer;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(125,211,252,.35);
    }

    .card.featured{
      grid-column:span 8;
      background:
        radial-gradient(circle at top right, rgba(241,196,15,.14), transparent 35%),
        linear-gradient(135deg, rgba(125,211,252,.08), rgba(167,139,250,.06)),
        var(--panel-2);
      border-color:rgba(241,196,15,.34);
    }

    .card.active{
      outline:2px solid rgba(125,211,252,.55);
      outline-offset:0;
    }

    .topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      background:rgba(241,196,15,.14);
      color:var(--gold);
      border:1px solid rgba(241,196,15,.28);
    }

    .index-no{
      font-size:12px;
      color:var(--muted);
    }

    .card h3{
      margin:0 0 10px;
      font-size:26px;
      line-height:1.1;
    }

    .card:not(.featured) h3{
      font-size:22px;
    }

    .meta{
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
    }

    .note{
      color:#d8e3fb;
      font-size:14px;
      margin-bottom:14px;
      opacity:.95;
    }

    .file{
      display:inline-block;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      color:#c8d5f0;
      font-size:13px;
      margin-bottom:18px;
      word-break:break-word;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding:10px 14px;
      border-radius:14px;
      font-weight:700;
      transition:.18s ease;
    }

    .btn-primary{
      background:var(--accent);
      color:#08111c;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .btn-ghost{
      background:transparent;
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
    }

    .btn-ghost:hover{
      border-color:rgba(125,211,252,.35);
      color:var(--accent);
    }

    .viewer{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .viewer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }

    .viewer-label{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--accent);
      font-weight:800;
      margin-bottom:5px;
    }

    .viewer-title{
      font-size:24px;
      font-weight:800;
      line-height:1.15;
      margin:0 0 4px;
    }

    .viewer-meta{
      color:var(--muted);
      font-size:14px;
    }

    .viewer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    iframe{
      width:100%;
      height:82vh;
      border:0;
      display:block;
      background:#0f172a;
    }

    .empty{
      padding:28px;
      background:var(--panel);
      border:1px dashed var(--line);
      border-radius:24px;
      color:var(--muted);
    }

    @media (max-width: 1100px){
      .card,
      .card.featured{grid-column:span 6;}
    }

    @media (max-width: 760px){
      .wrap{padding:18px 14px 24px}
      .hero{
        padding:20px;
        flex-direction:column;
        align-items:flex-start;
      }
      .hero-stats{
        width:100%;
        min-width:0;
      }
      .card,
      .card.featured{grid-column:span 12;}
      .viewer-head{
        flex-direction:column;
        align-items:flex-start;
      }
      iframe{height:72vh;}
    }
  </style>
</head>
<body>
  <div class="wrap">

    <section class="hero">
      <div class="hero-left">
        <div class="eyebrow">Miprasz / archiwum PDF</div>
        <h1>Podsumowania SBM</h1>
        <p>
          Ostatnie publikacje w jednym miejscu. Najnowsze podsumowanie jest wyróżnione
          i ładuje się automatycznie poniżej.
        </p>
      </div>

      <div class="hero-stats">
        <div class="kpi-label">Dostępne publikacje</div>
        <div class="kpi-value" id="reportsCount">0</div>
        <div class="kpi-note">Maksymalnie pokazywanych: 12</div>
      </div>
    </section>

    <section id="reportsGrid" class="grid"></section>

    <section id="viewer" class="viewer" style="display:none;">
      <div class="viewer-head">
        <div>
          <div class="viewer-label">Podgląd raportu</div>
          <div class="viewer-title" id="viewerTitle">—</div>
          <div class="viewer-meta" id="viewerMeta">—</div>
        </div>

        <div class="viewer-actions">
          <a id="openPdfBtn" class="btn btn-ghost" href="#" target="_blank" rel="noopener noreferrer">
            Otwórz PDF
          </a>
        </div>
      </div>

      <iframe id="pdfViewer" src=""></iframe>
    </section>

    <div id="emptyState" class="empty" style="display:none;">
      Brak raportów do wyświetlenia.
    </div>

  </div>

  <!-- Tu ładujesz osobny plik z listą raportów -->
  <script src="./reports-data.js"></script>

  <script>
    const MAX_REPORTS = 12;
    const reports = Array.isArray(window.REPORTS) ? window.REPORTS.slice() : [];

    const monthNames = {
      styczen: "Styczeń",
      luty: "Luty",
      marzec: "Marzec",
      kwiecien: "Kwiecień",
      maj: "Maj",
      czerwiec: "Czerwiec",
      lipiec: "Lipiec",
      sierpien: "Sierpień",
      wrzesien: "Wrzesień",
      pazdziernik: "Październik",
      listopad: "Listopad",
      grudzien: "Grudzień"
    };

    const reportsGrid = document.getElementById("reportsGrid");
    const reportsCount = document.getElementById("reportsCount");
    const viewer = document.getElementById("viewer");
    const viewerTitle = document.getElementById("viewerTitle");
    const viewerMeta = document.getElementById("viewerMeta");
    const pdfViewer = document.getElementById("pdfViewer");
    const openPdfBtn = document.getElementById("openPdfBtn");
    const emptyState = document.getElementById("emptyState");

    function normalizePolish(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/ą/g, "a")
        .replace(/ć/g, "c")
        .replace(/ę/g, "e")
        .replace(/ł/g, "l")
        .replace(/ń/g, "n")
        .replace(/ó/g, "o")
        .replace(/ś/g, "s")
        .replace(/[źż]/g, "z");
    }

    function formatDate(isoDate) {
      if (!isoDate) return "";
      const d = new Date(isoDate);
      if (Number.isNaN(d.getTime())) return isoDate;

      return new Intl.DateTimeFormat("pl-PL", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      }).format(d);
    }

    function prettyTitleFromFile(filename) {
      const base = String(filename || "").replace(/\.pdf$/i, "");
      const match = base.match(/^([A-Za-zĄąĆćĘęŁłŃńÓóŚśŹźŻż]+)(\d{4})$/);

      if (!match) return base;

      const rawMonth = normalizePolish(match[1]);
      const year = match[2];
      const month = monthNames[rawMonth] || match[1];

      return `${month} ${year}`;
    }

    function safeTitle(report) {
      return report.title || prettyTitleFromFile(report.file);
    }

    function parseDateValue(value) {
      const time = new Date(value).getTime();
      return Number.isNaN(time) ? 0 : time;
    }

    function loadReport(report) {
      const title = safeTitle(report);

      viewer.style.display = "block";
      viewerTitle.textContent = title;
      viewerMeta.textContent = report.published
        ? `Data publikacji: ${formatDate(report.published)}`
        : "";
      pdfViewer.src = `${report.file}#view=FitH`;
      openPdfBtn.href = report.file;

      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("active", card.dataset.file === report.file);
      });

      viewer.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function createButton(text, className, type = "button") {
      const btn = document.createElement(type === "a" ? "a" : "button");
      btn.className = className;
      if (type !== "a") btn.type = "button";
      btn.textContent = text;
      return btn;
    }

    function createCard(report, index) {
      const card = document.createElement("article");
      card.className = `card${index === 0 ? " featured" : ""}`;
      card.dataset.file = report.file || "";

      const topline = document.createElement("div");
      topline.className = "topline";

      const left = document.createElement("div");
      if (index === 0) {
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "Najnowsze";
        left.appendChild(badge);
      }

      const right = document.createElement("span");
      right.className = "index-no";
      right.textContent = String(index + 1).padStart(2, "0");

      topline.appendChild(left);
      topline.appendChild(right);

      const h3 = document.createElement("h3");
      h3.textContent = safeTitle(report);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = report.published
        ? `Data publikacji: ${formatDate(report.published)}`
        : "Data publikacji: —";

      const note = document.createElement("div");
      note.className = "note";
      note.textContent = report.note || "";

      const file = document.createElement("div");
      file.className = "file";
      file.textContent = report.file || "";

      const actions = document.createElement("div");
      actions.className = "actions";

      const previewBtn = createButton("Pokaż poniżej", "btn btn-primary");
      previewBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        loadReport(report);
      });

      const openBtn = createButton("Otwórz PDF", "btn btn-ghost", "a");
      openBtn.href = report.file || "#";
      openBtn.target = "_blank";
      openBtn.rel = "noopener noreferrer";
      openBtn.addEventListener("click", (e) => e.stopPropagation());

      actions.appendChild(previewBtn);
      actions.appendChild(openBtn);

      card.appendChild(topline);
      card.appendChild(h3);
      card.appendChild(meta);

      if (report.note) {
        card.appendChild(note);
      }

      card.appendChild(file);
      card.appendChild(actions);

      card.addEventListener("click", () => loadReport(report));

      return card;
    }

    function init() {
      const validReports = reports
        .filter(item => item && item.file)
        .sort((a, b) => parseDateValue(b.published) - parseDateValue(a.published))
        .slice(0, MAX_REPORTS);

      reportsCount.textContent = validReports.length;

      if (!validReports.length) {
        emptyState.style.display = "block";
        return;
      }

      validReports.forEach((report, index) => {
        reportsGrid.appendChild(createCard(report, index));
      });

      loadReport(validReports[0]);
    }

    init();
  </script>
</body>
</html>
